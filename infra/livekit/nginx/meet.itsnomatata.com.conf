# Nginx site for meet.itsnomatata.com
# Install: sudo cp meet.itsnomatata.com.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/meet.itsnomatata.com.conf /etc/nginx/sites-enabled/
# TLS:     sudo certbot --nginx -d meet.itsnomatata.com

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name meet.itsnomatata.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name meet.itsnomatata.com;

    # Certbot fills these paths after: certbot --nginx -d meet.itsnomatata.com
    ssl_certificate     /etc/letsencrypt/live/meet.itsnomatata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meet.itsnomatata.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # LiveKit signaling WebSocket (browser connects to wss://meet.itsnomatata.com)
    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
